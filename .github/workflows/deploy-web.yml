name: Deploy fare map (Azure Static Web Apps)

# Deploys web/public to Azure Static Web Apps. The app is already static (no
# build step), so we skip the Oryx build and just upload the folder.
#
# Requires repo secret AZURE_STATIC_WEB_APPS_API_TOKEN (the Static Web App
# deployment token). Set it with:
#   az staticwebapp secrets list -n flights-fare-map -g rg-flights-fare-map \
#     --query "properties.apiKey" -o tsv | gh secret set AZURE_STATIC_WEB_APPS_API_TOKEN

on:
  push:
    branches: [main]
    paths:
      - 'web/public/**'
      - '.github/workflows/deploy-web.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - 'web/public/**'
      - '.github/workflows/deploy-web.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v5
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: 'web/public'
          skip_app_build: true

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close preview environment
    steps:
      - name: Close
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
