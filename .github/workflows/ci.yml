name: CI

# Quality gates. The `quality` job runs the Python gate — format (Black), lint
# (Ruff), type-check (mypy) and the offline test-suite (pytest) across supported
# Python versions. The `web` job runs the front-end gate — ESLint, Prettier and
# the Vitest unit tests for web/. All tests mock provider HTTP, so nothing here
# touches a live airline backend.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black (format check)
        run: black --check src tests web/build_data.py examples

      - name: Ruff (lint)
        run: ruff check src tests web/build_data.py examples

      - name: mypy (type check)
        run: mypy src

      - name: pytest
        run: pytest

  web:
    runs-on: ubuntu-latest
    name: Web (lint + test)
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (format check)
        run: npm run format

      - name: Vitest
        run: npm test
