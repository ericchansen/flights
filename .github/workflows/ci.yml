name: CI

# Python quality gate: format (Black), lint (Ruff), type-check (mypy) and the
# offline test-suite (pytest) across the supported Python versions. All tests
# mock provider HTTP, so nothing here touches a live airline backend.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    name: Python ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Black (format check)
        run: black --check src tests web/build_data.py examples

      - name: Ruff (lint)
        run: ruff check src tests web/build_data.py examples

      - name: mypy (type check)
        run: mypy src

      - name: pytest
        run: pytest
